name: Bug report
description: Report a reproducible problem in the ROS 2 port.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Please do not report security vulnerabilities here; follow SECURITY.md instead."
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Ubuntu version, ROS distribution, GPU backend choice and commit SHA.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and expected behavior
      description: Include relevant terminal output, ROS topics/frames and RViz status.
    validations:
      required: true
